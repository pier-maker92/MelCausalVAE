convformer:
  compress_factor_C: 8
  tf_heads: 8
  tf_layers: 4
  drop_p: 0.1
  latent_dim: 64
  logvar_layer: true
  n_residual_blocks: 3
  kl_loss_weight: 1.0e-3
  target_std: null
  use_sofplus: null
  kl_loss_warmup_steps: 1000
  use_classic_decoder: false
  use_bigvgan_mel: false
  use_1d_encoder: false
  use_similarity: false
  similarity_threshold: 0.9
  similarity_threshold_in_01: false
  freeze_encoder_before_latent_heads: false
  # Latent ablations (toggle independently or together). Chunks are contiguous
  # channel groups of size latent_chunk_size (default 2 for dims [0:2), [2:4), ...).
  latent_chunk_ablate_dropout: false
  latent_chunk_ablate_kl: false
  latent_chunk_size: 2
  # latent_chunk_dropout_start / end: linear schedule endpoints (see below).
  # latent_chunk_dropout_hierarchical: true = one random cutoff, drop chunks s..end
  #   (chunk 0 never dropped); false = each chunk dropped independently (Bernoulli p_i).
  latent_chunk_dropout_start: 0.0
  latent_chunk_dropout_end: 0.8
  latent_chunk_dropout_hierarchical: false
  latent_chunk_kl_weight_start: 1.0e-10
  latent_chunk_kl_weight_end: 1.0e-2


