# @package _global_
# FSQ fine-tuning from setting30 checkpoint — encoder frozen, WITH instance norm on tail.
# 5 epochs, batch 32, full GPU.

compress_factor: 4
mel_dim: 100
latent_dim: 64
sample_rate: 24000

encoder:
  d_model: 1024
  tf_heads: 8
  tf_layers: 4
  n_residual_blocks: 3
  logvar_layer: false
  target_std: 1.0

  kl_loss_weight: 0.0
  use_reparameterization_trick: false
  use_instance_norm: true
  use_softplus: false
  use_slt: false

  vq_config:
    fsq_levels: [2, 2, 2, 2, 2, 2, 2, 2]   # 2^8 = 256 codes
    dim_to_quantize: 8
    commitment_weight: 0.0

  dropout_regularizer_config: null
  kl_chunk_regularizer_config: null
  noise_regularizer_config: null
  semantic_distillation_config: null

decoder:
  dit_dim: 768
  dit_depth: 6
  dit_heads: 12
  dit_dropout_rate: 0.1
  use_conv_layer: true
  uncond_prob: 0.15
  is_causal: true
  use_window_attention: true
  window_attention_seconds: 3.0
  kernel_size: 7
  causal_convolution: false

training:
  dataset_name: librispeech-aligned
  from_pretrained: "checkpoints/exps/18-June-2026/11:13:26_vq-def_30.yaml/checkpoint-27500/model.safetensors"
  freeze_encoder: true

  max_steps: -1
  num_train_epochs: 5
  output_dir: checkpoints/agent/fsq-in-ft
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1

  learning_rate: 1.0e-4
  encoder_lr: 3.0e-4
  decoder_lr: 1.0e-4
  encoder_warmup_ratio: 0.01
  decoder_warmup_ratio: 0.05
  lr_scheduler_type: cosine
  encoder_min_lr: 0.0
  decoder_min_lr: 3.0e-5

  bf16: true
  fp16: false
  max_grad_norm: 1.0

  save_steps: 2500
  logging_steps: 50
  eval_strategy: steps
  eval_steps: 2500
  save_total_limit: 2
  load_best_model_at_end: false

  eval_num_samples: 10
  report_to: wandb
  wandb_project: speech-vae
  dataloader_num_workers: 8
  generate_and_log_samples: false
