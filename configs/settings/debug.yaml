
# @package _global_
# Global VAE parameters that override configs/main.yaml defaults
compress_factor: 8
mel_dim: 100
latent_dim: 64
sample_rate: 24000

# Training configuration
training:
  num_train_epochs: 3
  dataset_name: libritts
  output_dir: checkpoints/exps/debug
  learning_rate: 1e-4
  min_learning_rate: 5e-5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 2
  report_to: wandb
  wandb_project: speech-vae
  wandb_run_name: debug
  fp16: false
  bf16: true
  save_steps: 10
  eval_strategy: "no"
  save_total_limit: 1
  gradient_accumulation_steps: 2
  dataloader_num_workers: 0
  #from_pretrained: /home/ec2-user/MelCausalVAE/checkpoints/MelCausalVAE/restored-downsample8X/checkpoint-16000/model.safetensors
  #resume_from_checkpoint: /home/ec2-user/MelCausalVAE/checkpoints/MelCausalVAE/restored-downsample8X/checkpoint-16000

# Encoder configuration
encoder:
  d_model: 512
  tf_heads: 4
  tf_layers: 2
  n_residual_blocks: 3
  logvar_layer: false
  target_std: 0.3
  kl_loss_warmup_steps: 1000
  kl_loss_weight: 5e-4
  # NOTE: legacy parameters like use_sofplus, use_1d_encoder have been removed.

  # --- VQ Config ---
  vq_config:
    num_embeddings: 128
    commitment_weight: 0.25
    reset_dead_codes: true
    reset_every_forward: 10
    residual_and_tail_dropout_p: 0.2  # (was vq_residual_dropout)
    dim_to_quantize: 32
    use_ema_codebook: false

  # --- Dropout Config ---
  dropout_regularizer_config:
    chunk_size: 2
    dropout_start: 0.0
    dropout_end: 0.6
    dropout_hierarchical: false

  # --- KL Config ---
  kl_chunk_regularizer_config: null
    # chunk_size: 2
    # kl_weight_start: 1.0e-10  # (was vq_kl_tail_weight_start)
    # kl_weight_end: 1.0e-4    # (was vq_kl_tail_weight_end)
    # NOTE: vq_kl_zero_chunks was removed as it's no longer in KLChunkRegularizer

# Decoder configuration
decoder:
  dit_dim: 512            # (was unet_dim)
  dit_depth: 4            # (was unet_depth)
  dit_heads: 8           # (was unet_heads)
  dit_dropout_rate: 0.1   # (was unet_dropout_rate)
  use_conv_layer: true
  uncond_prob: 0.15
  is_causal: false
  use_window_attention: true
  window_attention_seconds: 3.0
  # NOTE: learned_prior and audio_latent_dim have been removed.
