training:
  dataset_name: librispeech-align
  train_only_aligner: false
  output_dir: checkpoints/MelCausalVAE/q-former-fix # variable rate training
  num_train_epochs: 2
  learning_rate: 1e-4
  per_device_train_batch_size: 24
  report_to: wandb
  wandb_project: flexi-vae-paper
  wandb_run_name: q-former-fix
  fp16: false
  bf16: true
  save_steps: 1000
  eval_strategy: "steps"
  eval_steps: 1000
  save_total_limit: 1
  gradient_accumulation_steps: 1
  dataloader_num_workers: 4
  min_learning_rate: 5e-5
  #from_pretrained: /workspace/MelCausalVAE/checkpoints/MelCausalVAE/qformer/checkpoint-15000/model.safetensors
  #resume_from_checkpoint: /workspace/MelCausalVAE/checkpoints/MelCausalVAE/qformer/checkpoint-2000
  phonemes: true

convformer:
  compress_factor_C: 2
  tf_heads: 4
  tf_layers: 2
  latent_dim: 64
  logvar_layer: true
  use_sofplus: false
  target_std: 0.5
  kl_loss_warmup_steps: 500
  kl_loss_weight: 1e-9
  use_aligner: true
  freeze_encoder: false
  threshold: 0.90
  force_downsample: true
  d_model: 512
  

cfm:
  unet_dim: 768
  unet_depth: 4
  unet_heads: 8
  unet_dropout_rate: 0.1
  use_conv_layer: true
  audio_latent_dim: 64
  uncond_prob: 0.15
  learned_prior: false
  is_causal: true
  use_word_causal_mask: true
  decoder_type: "dit"