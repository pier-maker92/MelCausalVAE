# @package _global_
# Global VAE parameters that override configs/main.yaml defaults
compress_factor: 4
mel_dim: 100
latent_dim: 64
sample_rate: 24000

# Training configuration
training:
  num_train_epochs: 10
  dataset_name: librispeech_aligned
  output_dir: checkpoints/exps/vq-setting-16
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4

  # lr
  learning_rate: 1e-4
  encoder_lr: 3e-4
  decoder_lr: 1e-4
  encoder_warmup_ratio: 0.01
  decoder_warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  encoder_min_lr: 1.0e-4
  decoder_min_lr: 5.0e-5
  
  # report
  report_to: tensorboard
  wandb_project: speech-vae
  wandb_run_name: set16

  fp16: false
  bf16: true

  save_steps: 1000
  logging_steps: 1

  # eval 
  eval_strategy: "steps"
  eval_steps: 1000
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "avg_WER"
  greater_is_better: false
  early_stopping_patience: 5
  # vq patience
  vq_collapse_threshold: 0.5
  vq_collapse_patience: 5

  gradient_accumulation_steps: 1
  dataloader_num_workers: 8
  eval_num_samples: 10

  generate_and_log_samples: true

  #resume_from_checkpoint: /workspace/MelCausalVAE/checkpoints/exps/vq-setting-16-fixedIN-noIN/checkpoint-5000


# Encoder configuration
encoder:
  d_model: 1024
  tf_heads: 8
  tf_layers: 4
  n_residual_blocks: 3
  target_std: 1.0
  kl_loss_warmup_ratio: 0.01
  kl_loss_weight: 5e-3
  use_instance_norm: false
  use_logvar_acoustic: true
  acoustic_dim: 32
  acoustic_dropout_p: 0.25

  # --- VQ Config ---
  vq_config:
    num_embeddings: 256
    commitment_weight: 0.25
    reset_dead_codes: true
    reset_every_forward: 10
    dim_to_quantize: 24
    use_ema_codebook: true

  # --- Dropout Config ---
  dropout_regularizer_config: null
    # chunk_size: 1
    # strategy: "linear"
    # dropout_start: 0.0
    # dropout_end: 0.8
    # k: 6.0
    # x0: 0.5
    # dropout_hierarchical: false
    # pre_quantization: false

  # --- Semantic Distillation Config ---
  semantic_distillation_config:
    wavlm_layer: 18
    cosine_loss_weight: 1.0
    ortho_loss_weight: 0.0

  # --- KL Config ---
  kl_chunk_regularizer_config: null

# Decoder configuration
decoder:
  dit_dim: 768            
  dit_depth: 6            
  dit_heads: 12           
  dit_dropout_rate: 0.1   
  use_conv_layer: true
  uncond_prob: 0.15
  is_causal: true
  use_window_attention: true
  window_attention_seconds: 3.0
  kernel_size: 7
  causal_convolution: false
  speaker_cond_dim: 32
