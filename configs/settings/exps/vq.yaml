# @package _global_
# Global VAE parameters that override configs/main.yaml defaults
compress_factor: 4
mel_dim: 100
latent_dim: 64
sample_rate: 24000

# Training configuration
training:
  num_train_epochs: 10
  dataset_name: librispeech_aligned
  output_dir: checkpoints/exps/vq-refactored
  learning_rate: 1e-3
  encoder_lr: 1e-3
  decoder_lr: 1e-4
  encoder_warmup_ratio: 0.01
  decoder_warmup_ratio: 0.1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  report_to: wandb
  wandb_project: speech-vae
  wandb_run_name: vq-refactored
  fp16: false
  bf16: true
  save_steps: 1000
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 1000
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "avg_WER"
  greater_is_better: false
  early_stopping_patience: 5
  gradient_accumulation_steps: 1
  dataloader_num_workers: 8
  eval_num_samples: 100
  #from_pretrained: /home/ec2-user/MelCausalVAE/checkpoints/MelCausalVAE/restored-downsample8X/checkpoint-16000/model.safetensors
  resume_from_checkpoint: /home/piermel/links/scratch/MelCausalVAE/checkpoints/exps/vq-refactored/checkpoint-5000

# Encoder configuration
encoder:
  d_model: 1024
  tf_heads: 8
  tf_layers: 4
  n_residual_blocks: 3
  logvar_layer: false
  target_std: 1.0
  kl_loss_warmup_steps: 1000
  kl_loss_weight: 1e-4
  # NOTE: legacy parameters like use_sofplus, use_1d_encoder have been removed.

  # --- VQ Config ---
  vq_config:
    num_embeddings: 128
    commitment_weight: 0.25
    reset_dead_codes: true
    reset_every_forward: 10
    residual_and_tail_dropout_p: 0.2  # (was vq_residual_dropout)
    dim_to_quantize: 32
    use_ema_codebook: false

  # --- Dropout Config ---
  dropout_regularizer_config:
    chunk_size: 2
    dropout_start: 0.0
    dropout_end: 0.6
    dropout_hierarchical: false

  # --- KL Config ---
  kl_chunk_regularizer_config: null
    # chunk_size: 2
    # kl_weight_start: 1.0e-10  # (was vq_kl_tail_weight_start)
    # kl_weight_end: 1.0e-4    # (was vq_kl_tail_weight_end)
    # NOTE: vq_kl_zero_chunks was removed as it's no longer in KLChunkRegularizer

# Decoder configuration
decoder:
  dit_dim: 768            # (was unet_dim)
  dit_depth: 6            # (was unet_depth)
  dit_heads: 12           # (was unet_heads)
  dit_dropout_rate: 0.1   # (was unet_dropout_rate)
  use_conv_layer: true
  uncond_prob: 0.15
  is_causal: false
  use_window_attention: true
  window_attention_seconds: 3.0
  # NOTE: learned_prior and audio_latent_dim have been removed.
