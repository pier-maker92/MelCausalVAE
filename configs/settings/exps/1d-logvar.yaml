# Only specify values that override defaults in configs/defaults/*.yaml
training:
  num_train_epochs: 3
  dataset_name: librispeech_aligned
  output_dir: checkpoints/exps/1d-8x-AR-AE
  learning_rate: 3e-4
  min_learning_rate: 8e-5
  per_device_train_batch_size: 24
  per_device_eval_batch_size: 1
  report_to: wandb
  wandb_project: CaDiT-VAE-exps
  wandb_run_name: 1d-8x-AR-AE
  fp16: false
  bf16: true
  save_steps: 1000
  eval_steps: 500
  save_total_limit: 1
  gradient_accumulation_steps: 1
  dataloader_num_workers: 4
  #from_pretrained: /home/ec2-user/MelCausalVAE/checkpoints/MelCausalVAE/restored-downsample8X/checkpoint-16000/model.safetensors
  #resume_from_checkpoint: /home/ec2-user/MelCausalVAE/checkpoints/MelCausalVAE/restored-downsample8X/checkpoint-16000
convformer:
  compress_factor_C: 8
  tf_heads: 8
  tf_layers: 4
  latent_dim: 64
  n_residual_blocks: 3
  logvar_layer: true
  use_sofplus: false
  target_std: 0.3
  kl_loss_warmup_steps: 1000
  kl_loss_weight: 1e-10
  use_bigvgan_mel: false
  d_model: 1024
  use_1d_encoder: true

cfm:
  unet_dim: 768
  unet_depth: 6
  unet_heads: 12
  unet_dropout_rate: 0.1
  use_conv_layer: true
  audio_latent_dim: 64
  uncond_prob: 0.15
  learned_prior: false
  is_causal: false
  use_window_attention: true
  window_attention_seconds: 3.0